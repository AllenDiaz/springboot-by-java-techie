name: CI — Build, Test & Publish Docker Image

# ----------------------------------------------------------------
# Triggers
# ----------------------------------------------------------------
on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

# ----------------------------------------------------------------
# Global environment
# ----------------------------------------------------------------
env:
  REGISTRY: ghcr.io
  # Image name: ghcr.io/<owner>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==============================================================
  # Job 1 — Build & Test
  # ==============================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # 1. Check out source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (Temurin distribution — Eclipse)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven          # Caches ~/.m2 between runs for faster builds

      # 3. Build the project and run all tests
      - name: Build and run tests
        run: mvn verify -B

      # 4. Upload test reports so they appear in the GH Actions UI
      - name: Upload test results
        if: always()             # Run even when tests fail so reports are visible
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      # 5. Upload the built JAR so the Docker job can reuse it
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # ==============================================================
  # Job 2 — Build & Push Docker Image
  # Only runs on push to main/master (not on PRs from forks).
  # ==============================================================
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test          # Gate: only run if tests pass
    # Skip push for pull requests (avoids publishing unreviewed code)
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write              # Required to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download the JAR built in the previous job so the Docker
      # build stage can skip Maven (faster and more reproducible).
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      # Log in to GitHub Container Registry
      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags + labels) for the image
      # Tags produced:
      #   - ghcr.io/<owner>/<repo>:latest  (on default branch)
      #   - ghcr.io/<owner>/<repo>:<sha>
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      # Set up QEMU for multi-platform builds (optional, linux/amd64 default)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx for layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push the image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up layer rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
