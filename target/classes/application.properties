# Server
server.port=8080

# Actuator — expose health and info over HTTP
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Application info (surfaced by /actuator/info)
spring.application.name=webflux-demo
info.app.name=Spring Boot WebFlux Demo
info.app.description=Reactive programming learning demo
info.app.version=0.0.1-SNAPSHOT

# Netty (default WebFlux server) — tune worker threads for demo visibility
# reactor.netty.ioWorkerCount=4  # uncomment to override default (2 * CPU cores)
